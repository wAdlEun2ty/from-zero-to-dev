<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📘 My Docsify Docs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation powered by Docsify">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- Plugins style -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/docsify-themeable/style.min.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/docsify-themeable/dark.min.css" />
  <style>
    /* Custom tweaks */
    pre code {
      font-size: 14px;
      line-height: 1.5;
    }
    .markdown-section img {
      border-radius: 8px;
      max-width: 100%;
      cursor: zoom-in;
    }
  </style>
</head>
<body>
  <div id="app">Loading ...</div>

  <script>
    window.$docsify = {
      name: '📖 MyDocs',
      repo: 'https://github.com/username/repo',   // optional
      loadSidebar: true,      // gunakan _sidebar.md
      loadNavbar: true,       // gunakan _navbar.md
      subMaxLevel: 3,         // heading level di sidebar
      auto2top: true,         // auto scroll ke atas tiap ganti halaman
      relativePath: true,     // penting biar link relatif jalan
      coverpage: true,        // gunakan _coverpage.md

      // Search plugin
      search: {
        maxAge: 86400000, // 1 hari cache
        placeholder: 'Search...',
        noData: 'No results!',
        depth: 3
      },

      // Pagination plugin
      pagination: {
        previousText: '⬅️ Prev',
        nextText: 'Next ➡️',
        crossChapter: true,
        crossChapterText: true
      },

      // Copy Code plugin
      copyCode: {
        buttonText: '📋 Copy',
        errorText: 'Error',
        successText: '✔ Copied!'
      },

      // Dark/Light toggle
      darklightTheme: {
        defaultTheme: 'light',
        dark: {
          accent: '#42b983'
        },
        light: {
          accent: '#42b983'
        }
      }
    }
  </script>

  <!-- Core Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/front-matter.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/docsify-themeable.min.js"></script>

</body>
</html>
